experiment_name: "xlm_roberta_improved"
model:
  name: "xlm-roberta-base"
  max_length: 128
data:
  train_path: "data/raw/train.csv"
  dev_path: "data/raw/dev.csv"
training:
  output_dir: "models/slm_checkpoints"
  learning_rate: 2.0e-5
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 4
  num_train_epochs: 5
  eval_strategy: "epoch"
  save_strategy: "epoch"
  load_best_model_at_end: true
  save_total_limit: 2
  metric_for_best_model: "macro_f1"
  report_to: "wandb"
  warmup_ratio: 0.1
  weight_decay: 0.01
