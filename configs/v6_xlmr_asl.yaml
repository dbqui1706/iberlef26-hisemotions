experiment_name: "xlmr_asl_v6"
model:
  name: "xlm-roberta-base"  # LayerNorm fix: from_pretrained + ignore_mismatched_sizes=True
  max_length: 256

data:
  train_path: "data/raw/train.csv"
  dev_path: "data/raw/dev.csv"

loss:
  type: "asl"
  gamma_neg: 4
  gamma_pos: 0
  clip: 0.05

training:
  output_dir: "models/slm_checkpoints"
  learning_rate: 1.0e-5    # XLM-R cần lr thấp hơn BETO để ổn định
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 4
  num_train_epochs: 5
  eval_strategy: "epoch"
  save_strategy: "epoch"
  load_best_model_at_end: true
  save_total_limit: 1
  metric_for_best_model: "macro_f1"
  report_to: "wandb"
  warmup_ratio: 0.1
  weight_decay: 0.01
