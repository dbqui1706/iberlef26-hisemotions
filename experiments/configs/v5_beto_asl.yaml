experiment_name: "beto_asl_v5"
model:
  name: "dccuchile/bert-base-spanish-wwm-uncased"
  max_length: 256          # tăng từ 128 để tránh truncate văn bản lịch sử dài

data:
  train_path: "data/raw/train.csv"
  dev_path: "data/raw/dev.csv"

loss:
  type: "asl"
  gamma_neg: 4             # phạt mạnh easy negatives (fix Recall >> Precision)
  gamma_pos: 0             # không discount hard positives
  clip: 0.05               # floor xác suất âm tại 0.05

training:
  output_dir: "models/slm_checkpoints"
  learning_rate: 2.0e-5
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 4
  num_train_epochs: 5
  eval_strategy: "epoch"
  save_strategy: "epoch"
  load_best_model_at_end: true
  save_total_limit: 2
  metric_for_best_model: "macro_f1"
  report_to: "wandb"
  warmup_ratio: 0.1
  weight_decay: 0.01
